{% extends 'cases/base.html' %}

{% block title %}Login - IP Case Platform{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="victorian-card card" style="max-width: 400px; margin: 2rem auto;">
        <div class="card-header py-3 small-cap">Login</div>
        <div class="card-body">
          <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label small-cap" for="id_username">Username</label>
              <input class="form-control victorian-input" type="text" name="username" autofocus required id="id_username" />
            </div>
            <div class="mb-3">
              <label class="form-label small-cap" for="id_password">Password</label>
              <input class="form-control victorian-input" type="password" name="password" required id="id_password" />
            </div>
            {% if form.errors %}
              <div class="alert alert-danger">Invalid username or password.</div>
            {% endif %}
            <input type="hidden" name="next" value="{{ next|default:'/' }}" />
            <div class="d-grid">
              <button class="btn victorian-btn small-cap" type="submit">Login</button>
            </div>
            <div class="mt-3 text-center">
              <a class="victorian-link small-cap" href="{% url 'password_reset' %}">Forgot Password?</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
