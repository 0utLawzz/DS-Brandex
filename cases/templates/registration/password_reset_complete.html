{% extends 'cases/base.html' %}

{% block title %}Password Reset Complete - IP Case Platform{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="victorian-card card" style="max-width: 400px; margin: 2rem auto;">
        <div class="card-header py-3 small-cap">Password Reset Complete</div>
        <div class="card-body">
          <p class="small text-muted">Your password has been successfully reset. You can now log in with your new password.</p>
          <div class="mt-3 text-center">
            <a class="victorian-link small-cap" href="{% url 'login' %}">Go to Login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
