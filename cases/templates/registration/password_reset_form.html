{% extends 'cases/base.html' %}

{% block title %}Password Reset - IP Case Platform{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="victorian-card card" style="max-width: 400px; margin: 2rem auto;">
        <div class="card-header py-3 small-cap">Password Reset</div>
        <div class="card-body">
          <p class="small text-muted mb-3">Enter your email address and we'll send you a link to reset your password.</p>
          <form method="post" action="{% url 'password_reset' %}">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label small-cap" for="id_email">Email</label>
              <input class="form-control victorian-input" type="email" name="email" required id="id_email" />
            </div>
            <div class="d-grid">
              <button class="btn victorian-btn small-cap" type="submit">Send Reset Link</button>
            </div>
          </form>
          <div class="mt-3 text-center">
            <a class="victorian-link small-cap" href="{% url 'login' %}">Back to Login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
