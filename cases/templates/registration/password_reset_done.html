{% extends 'cases/base.html' %}

{% block title %}Password Reset Sent - IP Case Platform{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="victorian-card card" style="max-width: 400px; margin: 2rem auto;">
        <div class="card-header py-3 small-cap">Password Reset Sent</div>
        <div class="card-body">
          <p class="small text-muted">We've sent you an email with instructions to reset your password. Please check your inbox.</p>
          <div class="mt-3 text-center">
            <a class="victorian-link small-cap" href="{% url 'login' %}">Back to Login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
