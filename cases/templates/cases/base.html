<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}IP Case Platform{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    {% load static %}
    <link href="{% static 'cases/victorian.css' %}" rel="stylesheet" />
  </head>
  <body class="victorian-bg">
    <header class="victorian-header border-bottom">
      <div class="container py-3 d-flex align-items-center justify-content-between">
        <div>
          <div class="victorian-title">Office IP Case Platform</div>
          <div class="victorian-subtitle">Trademark Case Workflow</div>
        </div>
        <div class="d-flex align-items-center gap-3">
          {% if user.is_authenticated %}
            <div class="small">Logged in as <strong>{{ user.username }}</strong></div>
            <form method="post" action="{% url 'logout' %}" class="m-0">
              {% csrf_token %}
              <button class="btn btn-sm victorian-btn" type="submit">Logout</button>
            </form>
          {% else %}
            <a class="btn btn-sm victorian-btn" href="{% url 'login' %}">Login</a>
          {% endif %}
        </div>
      </div>
    </header>

    <main class="container my-4">
      {% block content %}{% endblock %}
    </main>

    <footer class="container pb-4">
      <div class="small text-muted">Internal office tool (LAN)</div>
    </footer>
  </body>
</html>
